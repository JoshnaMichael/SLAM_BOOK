<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memories with your Josh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --ink: #4b3f72;
        --accent: #f7b8d6;
        --accent-2: #b9a7f5;
        --paper: #fffefb;
      }
      body {
        background:
          radial-gradient(circle at 10% 10%, rgba(247, 184, 214, 0.38), transparent 35%),
          radial-gradient(circle at 90% 20%, rgba(185, 167, 245, 0.28), transparent 30%),
          linear-gradient(145deg, #fff7fc 0%, #f6f1ff 52%, #fff8fd 100%);
        min-height: 100vh;
        color: var(--ink);
        font-family: 'DM Sans', sans-serif;
        cursor: none;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      #cursor {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        font-size: 16px;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease;
      }
      #cursor.clicking {
        transform: translate(-50%, -50%) scale(1.5);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-dE_iVdFf.js"></script>
  </head>
  <body>
    <div id="cursor">🩷</div>
    <div id="root"></div>
    <script>
      const cursor = document.getElementById('cursor');
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
      document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
    </script>
  </body>
</html>
